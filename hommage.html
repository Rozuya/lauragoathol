<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Conclusion | House of Laura</title>
    <style>
        body { 
            background-color: #0e0e10; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        
        .final-msg { 
            font-size: 3rem; 
            background: linear-gradient(to right, #9146FF, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .back-home { 
            margin-top: 50px; 
            color: #9146FF; 
            text-decoration: none; 
            border-bottom: 1px solid #9146FF;
        }
    </style>
</head>
<body>

    <h1 class="final-msg">Merci d'être toi.</h1>
    <p>La GOAT, c'est pas juste un titre. C'est Laura.</p>
    
    <a href="index.html" class="back-home">Retour au calme</a>
